name: Dashboard CI

on:
  push:
    branches: [main]
    paths:
      - "web/dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    paths:
      - "web/dashboard/**"

defaults:
  run:
    working-directory: web/dashboard

jobs:
  # ─────────────────────────────────────────
  # 1. Type-check + lint
  # ─────────────────────────────────────────
  typecheck:
    name: TypeScript + ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  # ─────────────────────────────────────────
  # 2. Unit tests
  # ─────────────────────────────────────────
  unit:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - run: npm ci
      - run: npm test -- --reporter=verbose

  # ─────────────────────────────────────────
  # 3. Codegen gate — generated types must match committed baseline
  # ─────────────────────────────────────────
  codegen-check:
    name: Codegen gate
    runs-on: ubuntu-latest
    # Only run when the API is available (skip in PR from forks)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      api:
        image: trendstorm/api:latest
        ports:
          - 8080:8080
        env:
          APP__ENV: local
          AUTH__MODE: disabled
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - run: npm ci
      - run: npm run codegen:check
        env:
          VITE_API_BASE_URL: http://localhost:8080

  # ─────────────────────────────────────────
  # 4. Build
  # ─────────────────────────────────────────
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [typecheck, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_AUTH0_DOMAIN: placeholder.auth0.com
          VITE_AUTH0_CLIENT_ID: placeholder
          VITE_API_BASE_URL: https://api.trendstorm.ai
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: web/dashboard/dist/

  # ─────────────────────────────────────────
  # 5. Helm lint
  # ─────────────────────────────────────────
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint helm/dashboard
        working-directory: ${{ github.workspace }}
