{{/*
Worker deployments + KEDA ScaledObjects for all Kafka consumers.

Each worker follows the same pattern:
  - Deployment (controlled replica count or KEDA managed)
  - KEDA ScaledObject (Kafka consumer lag trigger)

Workers included:
  - orchestrator-worker
  - scout-worker
  - knowledge-worker
  - analyst-worker
  - publisher-worker
  - sse-coordinator-worker
  - outbox-relay-worker (no KEDA — single-writer; plain HPA not needed)
  - production-eval-worker
*/}}

{{/*
=============================================================================
Helper: common worker container spec (sans image / specific env)
=============================================================================
*/}}

{{- define "trendstorm.workerEnv" -}}
{{- include "trendstorm.globalEnv" . }}
{{- include "trendstorm.mongoEnv" . }}
{{- include "trendstorm.redisEnv" . }}
{{- include "trendstorm.kafkaEnv" . }}
- name: BLOB__ENDPOINT_URL
  valueFrom:
    secretKeyRef:
      name: trendstorm-secrets
      key: blob_endpoint_url
      optional: true
- name: BLOB__ACCESS_KEY
  valueFrom:
    secretKeyRef:
      name: trendstorm-secrets
      key: blob_access_key
      optional: true
- name: BLOB__SECRET_KEY
  valueFrom:
    secretKeyRef:
      name: trendstorm-secrets
      key: blob_secret_key
      optional: true
- name: VECTOR__HOST
  valueFrom:
    secretKeyRef:
      name: trendstorm-secrets
      key: vector_host
      optional: true
- name: LLM__ANTHROPIC_API_KEY
  valueFrom:
    secretKeyRef:
      name: trendstorm-secrets
      key: llm_anthropic_api_key
      optional: true
- name: LLM__OPENAI_API_KEY
  valueFrom:
    secretKeyRef:
      name: trendstorm-secrets
      key: llm_openai_api_key
      optional: true
- name: LLM__GEMINI_API_KEY
  valueFrom:
    secretKeyRef:
      name: trendstorm-secrets
      key: llm_gemini_api_key
      optional: true
- name: LLM__COHERE_API_KEY
  valueFrom:
    secretKeyRef:
      name: trendstorm-secrets
      key: llm_cohere_api_key
      optional: true
{{- end }}

{{/*
=============================================================================
Orchestrator worker
=============================================================================
*/}}
{{- if .Values.orchestratorWorker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trendstorm.fullname" . }}-orchestrator-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trendstorm.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator-worker
spec:
  replicas: {{ .Values.orchestratorWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "trendstorm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: orchestrator-worker
  template:
    metadata:
      labels:
        {{- include "trendstorm.labels" . | nindent 8 }}
        app.kubernetes.io/component: orchestrator-worker
    spec:
      serviceAccountName: {{ include "trendstorm.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: orchestrator-worker
          image: {{ include "trendstorm.image" (dict "registry" .Values.global.imageRegistry "name" .Values.orchestratorWorker.image.name "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            {{- include "trendstorm.workerEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.orchestratorWorker.resources | nindent 12 }}
      terminationGracePeriodSeconds: 60
{{- if .Values.orchestratorWorker.keda.enabled }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "trendstorm.fullname" . }}-orchestrator-worker
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    name: {{ include "trendstorm.fullname" . }}-orchestrator-worker
  minReplicaCount: {{ .Values.orchestratorWorker.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.orchestratorWorker.keda.maxReplicaCount }}
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: {{ .Values.keda.kafkaBroker | quote }}
        consumerGroup: {{ .Values.orchestratorWorker.keda.consumerGroup | quote }}
        topic: {{ .Values.orchestratorWorker.keda.topic | quote }}
        lagThreshold: {{ .Values.orchestratorWorker.keda.lagThreshold | quote }}
        offsetResetPolicy: latest
{{- end }}
{{- end }}

