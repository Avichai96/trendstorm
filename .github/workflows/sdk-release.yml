name: SDK Release

on:
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read
  id-token: write   # required for trusted publishing to PyPI

jobs:
  # ─────────────────────────────────────────
  # 1. Run SDK unit tests
  # ─────────────────────────────────────────
  test:
    name: SDK unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install shared package
        working-directory: packages/trendstorm-shared
        run: uv pip install -e . --system

      - name: Install SDK + dev deps
        working-directory: sdk/python
        run: uv pip install -e ".[dev]" --system

      - name: Run unit tests
        working-directory: sdk/python
        run: pytest tests/unit -m unit -v

  # ─────────────────────────────────────────
  # 2. Build distributions
  # ─────────────────────────────────────────
  build-shared:
    name: Build trendstorm-shared
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling
      - name: Build
        working-directory: packages/trendstorm-shared
        run: python -m hatchling build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-shared
          path: packages/trendstorm-shared/dist/

  build-sdk:
    name: Build trendstorm SDK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling
      - name: Build
        working-directory: sdk/python
        run: python -m hatchling build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdk
          path: sdk/python/dist/

  # ─────────────────────────────────────────
  # 3. Publish to PyPI (trusted publishing)
  # ─────────────────────────────────────────
  publish-shared:
    name: Publish trendstorm-shared to PyPI
    runs-on: ubuntu-latest
    needs: build-shared
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-shared
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-sdk:
    name: Publish trendstorm SDK to PyPI
    runs-on: ubuntu-latest
    needs: [build-sdk, publish-shared]
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-sdk
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ─────────────────────────────────────────
  # 4. Build and deploy docs
  # ─────────────────────────────────────────
  docs:
    name: Deploy SDK docs
    runs-on: ubuntu-latest
    needs: publish-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs deps
        working-directory: sdk/python
        run: pip install ".[dev]" mkdocs-material mkdocstrings[python]
      - name: Build docs
        working-directory: sdk/python
        run: mkdocs build --config-file docs/mkdocs.yml --site-dir ../../site/sdk
      # TODO: replace with your deployment target (GitHub Pages, Cloudflare Pages, etc.)
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-docs
          path: site/sdk/
