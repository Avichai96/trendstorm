site_name: TrendStorm Python SDK
site_description: Python SDK for the TrendStorm AI trend intelligence platform
site_url: https://docs.trendstorm.io/sdk/python
repo_url: https://github.com/trendstorm/trendstorm
repo_name: trendstorm/trendstorm
edit_uri: edit/main/sdk/python/docs/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started: quickstart.md
  - Authentication: authentication.md
  - Streaming: streaming.md
  - HITL Reviews: hitl.md
  - Error Handling: error-handling.md
  - API Reference: api-reference.md
