[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trendstorm-shared"
version = "0.1.0"
description = "Shared API contract types for TrendStorm AI — used by both the server and SDK"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
dependencies = ["pydantic>=2.7"]

[tool.hatch.build.targets.wheel]
packages = ["src/trendstorm_shared"]
