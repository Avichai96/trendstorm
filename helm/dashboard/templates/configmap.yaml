apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trendstorm-dashboard.fullname" . }}-runtime-config
  labels:
    {{- include "trendstorm-dashboard.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "apiBaseUrl": {{ .Values.runtimeConfig.apiBaseUrl | quote }},
      "auth0Domain": {{ .Values.runtimeConfig.auth0Domain | quote }},
      "auth0ClientId": {{ .Values.runtimeConfig.auth0ClientId | quote }},
      "auth0Audience": {{ .Values.runtimeConfig.auth0Audience | quote }}
    }
  nginx.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      # All unresolved paths fall back to index.html (SPA routing)
      location / {
        try_files $uri $uri/ /index.html;
      }

      # config.json is served from the ConfigMap mount, not the build artifact
      location = /config.json {
        alias /etc/dashboard/config.json;
        add_header Cache-Control "no-store";
      }

      # Build artifacts are content-hashed — long cache
      location ~* \.(js|css|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }

      # Security headers
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
