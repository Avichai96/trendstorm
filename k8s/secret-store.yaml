# SecretStore — points the External Secrets Operator to AWS SSM Parameter Store.
#
# Prerequisites:
#   1. External Secrets Operator installed (see helm/trendstorm/templates/externalsecret.yaml)
#   2. An IAM role `arn:aws:iam::ACCOUNT_ID:role/trendstorm-secrets-reader` with
#      ssm:GetParameter + ssm:GetParametersByPath on /trendstorm/production/*
#   3. IRSA (IAM Roles for Service Accounts) wired to the trendstorm ServiceAccount
#
# Replace ACCOUNT_ID and REGION with actual values. Store this in your GitOps repo
# (not in the Helm chart — it's cluster-specific infrastructure, not app config).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: trendstorm-secret-store
  namespace: trendstorm
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1   # replace with your region
      auth:
        jwt:
          serviceAccountRef:
            name: trendstorm
            namespace: trendstorm
---
