{{- if .Values.externalSecrets.enabled -}}
# ExternalSecret syncs credentials from the cluster SecretStore (AWS SSM / Vault)
# into a Kubernetes Secret named `trendstorm-secrets`.
#
# All containers reference keys from this Secret via `secretKeyRef`.
# The External Secrets Operator must be installed in the cluster:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "trendstorm.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trendstorm.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  target:
    name: trendstorm-secrets
    creationPolicy: Owner
  data:
    - secretKey: mongo_uri
      remoteRef:
        key: /trendstorm/production/MONGO__URI
    - secretKey: redis_url
      remoteRef:
        key: /trendstorm/production/REDIS__URL
    - secretKey: kafka_bootstrap_servers
      remoteRef:
        key: /trendstorm/production/KAFKA__BOOTSTRAP_SERVERS
    - secretKey: blob_endpoint_url
      remoteRef:
        key: /trendstorm/production/BLOB__ENDPOINT_URL
    - secretKey: blob_access_key
      remoteRef:
        key: /trendstorm/production/BLOB__ACCESS_KEY
    - secretKey: blob_secret_key
      remoteRef:
        key: /trendstorm/production/BLOB__SECRET_KEY
    - secretKey: vector_host
      remoteRef:
        key: /trendstorm/production/VECTOR__HOST
    - secretKey: llm_anthropic_api_key
      remoteRef:
        key: /trendstorm/production/LLM__ANTHROPIC_API_KEY
    - secretKey: llm_openai_api_key
      remoteRef:
        key: /trendstorm/production/LLM__OPENAI_API_KEY
    - secretKey: llm_gemini_api_key
      remoteRef:
        key: /trendstorm/production/LLM__GEMINI_API_KEY
    - secretKey: llm_cohere_api_key
      remoteRef:
        key: /trendstorm/production/LLM__COHERE_API_KEY
    - secretKey: jwt_issuer_url
      remoteRef:
        key: /trendstorm/production/AUTH__JWT_ISSUER_URL
    - secretKey: jwt_audience
      remoteRef:
        key: /trendstorm/production/AUTH__JWT_AUDIENCE
{{- end }}
