{{/*
=============================================================================
Outbox relay worker (no KEDA — single-writer pattern)
=============================================================================
*/}}
{{- if .Values.outboxRelayWorker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trendstorm.fullname" . }}-outbox-relay-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trendstorm.labels" . | nindent 4 }}
    app.kubernetes.io/component: outbox-relay-worker
spec:
  replicas: {{ .Values.outboxRelayWorker.replicaCount }}
  strategy:
    type: Recreate   # Single-writer: no two pods should poll simultaneously.
  selector:
    matchLabels:
      {{- include "trendstorm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: outbox-relay-worker
  template:
    metadata:
      labels:
        {{- include "trendstorm.labels" . | nindent 8 }}
        app.kubernetes.io/component: outbox-relay-worker
    spec:
      serviceAccountName: {{ include "trendstorm.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: outbox-relay-worker
          image: {{ include "trendstorm.image" (dict "registry" .Values.global.imageRegistry "name" .Values.outboxRelayWorker.image.name "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            {{- include "trendstorm.workerEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.outboxRelayWorker.resources | nindent 12 }}
      terminationGracePeriodSeconds: 30
{{- end }}

