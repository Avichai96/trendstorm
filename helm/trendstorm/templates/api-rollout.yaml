{{/*
Argo Rollouts — canary deployment strategy for the API.

Replaces the standard Deployment for `api` when Argo Rollouts is installed.
Disable `api.enabled` and enable `api.rollout.enabled` to switch.

Install Argo Rollouts:
  kubectl create namespace argo-rollouts
  kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
*/}}
{{- if and .Values.api.rollout (kindIs "map" .Values.api.rollout) (.Values.api.rollout).enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "trendstorm.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trendstorm.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "trendstorm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    canary:
      # Steps: route 10% → run analysis for 5m → route 50% → full.
      steps:
        - setWeight: 10
        - pause:
            duration: 5m
        - setWeight: 50
        - pause:
            duration: 5m
        - setWeight: 100
      # Automatically roll back if the analysis fails.
      analysis:
        templates:
          - templateName: {{ include "trendstorm.fullname" . }}-api-success-rate
        startingStep: 1   # start after the first setWeight
      canaryService: {{ include "trendstorm.fullname" . }}-api-canary
      stableService: {{ include "trendstorm.fullname" . }}-api-stable
  template:
    metadata:
      labels:
        {{- include "trendstorm.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "trendstorm.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: {{ include "trendstorm.image" (dict "registry" .Values.global.imageRegistry "name" .Values.api.image.name "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- include "trendstorm.globalEnv" . | nindent 12 }}
            {{- include "trendstorm.mongoEnv" . | nindent 12 }}
            {{- include "trendstorm.redisEnv" . | nindent 12 }}
            {{- include "trendstorm.kafkaEnv" . | nindent 12 }}
            {{- range $key, $val := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
# AnalysisTemplate: gate the canary on HTTP 5xx error rate < 1%.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "trendstorm.fullname" . }}-api-success-rate
  namespace: {{ .Release.Namespace }}
spec:
  metrics:
    - name: http-success-rate
      # Query Prometheus every 30s; fail if 5xx rate > 1% over the last 2m.
      interval: 30s
      successCondition: "result[0] >= 0.99"
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus:9090
          query: |
            sum(rate(http_requests_total{job="trendstorm-api",status!~"5.."}[2m]))
            /
            sum(rate(http_requests_total{job="trendstorm-api"}[2m]))
{{- end }}
